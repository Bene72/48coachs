 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>48 Coachs en Amérique – Ultimate League</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#7B2FBE;--c2:#F5C842;--c3:#E8432D;--c4:#3A86FF;
  --c5:#06D6A0;--c6:#FF6B35;--c7:#2EC4B6;--c8:#9BF542;
  --bg:#0A0A0F;--bg2:#12121C;--bg3:#1A1A28;
  --border:rgba(255,255,255,0.08);--text:#F0F0FF;--muted:#7070A0;
  --green:#22C55E;--red:#EF4444;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

.bg-blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.11}
.b1{width:500px;height:500px;background:#7B2FBE;top:-120px;left:-100px;animation:bm1 13s ease-in-out infinite}
.b2{width:400px;height:400px;background:#E8432D;top:35%;right:-80px;animation:bm2 16s ease-in-out infinite}
.b3{width:350px;height:350px;background:#3A86FF;bottom:15%;left:15%;animation:bm3 19s ease-in-out infinite}
.b4{width:280px;height:280px;background:#06D6A0;bottom:-60px;right:25%;animation:bm1 21s ease-in-out infinite reverse}
@keyframes bm1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,35px)}}
@keyframes bm2{0%,100%{transform:translate(0,0)}50%{transform:translate(-35px,55px)}}
@keyframes bm3{0%,100%{transform:translate(0,0)}50%{transform:translate(45px,-25px)}}

.app{position:relative;z-index:1;max-width:940px;margin:0 auto;padding:0 16px 100px}

/* HEADER */
.header{padding:22px 0 18px;border-bottom:1px solid var(--border);margin-bottom:22px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo-area{display:flex;align-items:center;gap:13px}
.logo-badge{width:54px;height:54px;border-radius:13px;overflow:hidden;
  background:linear-gradient(135deg,#7B2FBE,#4A1890);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(123,47,190,.5);flex-shrink:0}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  background:linear-gradient(135deg,#F5C842,#FF6B35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.live-pill{display:flex;align-items:center;gap:7px;background:rgba(34,197,94,.1);
  border:1px solid rgba(34,197,94,.3);border-radius:100px;padding:7px 15px;
  font-size:12px;color:#22C55E;font-weight:700;letter-spacing:1px}
.ldot{width:7px;height:7px;background:#22C55E;border-radius:50%;animation:lp 1.5s infinite}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.color-strip{display:flex;height:5px;border-radius:100px;overflow:hidden;gap:2px}
.cs{flex:1;border-radius:100px}

/* NAV */
.nav{display:flex;gap:3px;margin-bottom:22px;background:var(--bg2);border-radius:14px;padding:5px}
.nav-btn{flex:1;padding:11px 4px;border:none;border-radius:10px;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;
  background:transparent;color:var(--muted);transition:all .25s}
.nav-btn.active{background:linear-gradient(135deg,#7B2FBE,#5B1F9E);color:#fff;
  box-shadow:0 4px 16px rgba(123,47,190,.4)}
.nav-btn:hover:not(.active){color:var(--text);background:var(--bg3)}

.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
  color:var(--c2);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* GROUP TABS */
.group-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.gtab{padding:7px 15px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg2);color:var(--muted);cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;transition:all .2s}
.gtab:hover:not(.active){border-color:var(--c2);color:var(--c2)}
.gtab[data-g="A"].active{background:#E8432D;border-color:#E8432D;color:#fff}
.gtab[data-g="B"].active{background:#3A86FF;border-color:#3A86FF;color:#fff}
.gtab[data-g="C"].active{background:#7B2FBE;border-color:#7B2FBE;color:#fff}
.gtab[data-g="D"].active{background:#06D6A0;border-color:#06D6A0;color:#000}
.gtab[data-g="E"].active{background:#FF6B35;border-color:#FF6B35;color:#fff}
.gtab[data-g="F"].active{background:#F5C842;border-color:#F5C842;color:#000}
.gtab[data-g="G"].active{background:#2EC4B6;border-color:#2EC4B6;color:#000}
.gtab[data-g="H"].active{background:#9BF542;border-color:#9BF542;color:#000}
.gtab[data-g="I"].active{background:#E8432D;border-color:#E8432D;color:#fff}
.gtab[data-g="J"].active{background:#3A86FF;border-color:#3A86FF;color:#fff}
.gtab[data-g="K"].active{background:#FF6B35;border-color:#FF6B35;color:#fff}
.gtab[data-g="L"].active{background:#7B2FBE;border-color:#7B2FBE;color:#fff}

/* GROUP CARD */
.group-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.group-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.group-header::before{content:'';position:absolute;inset:0;opacity:.08}
.gh-A::before{background:linear-gradient(135deg,#E8432D,transparent)}
.gh-B::before{background:linear-gradient(135deg,#3A86FF,transparent)}
.gh-C::before{background:linear-gradient(135deg,#7B2FBE,transparent)}
.gh-D::before{background:linear-gradient(135deg,#06D6A0,transparent)}
.gh-E::before{background:linear-gradient(135deg,#FF6B35,transparent)}
.gh-F::before{background:linear-gradient(135deg,#F5C842,transparent)}
.gh-G::before{background:linear-gradient(135deg,#2EC4B6,transparent)}
.gh-H::before{background:linear-gradient(135deg,#9BF542,transparent)}
.gh-I::before{background:linear-gradient(135deg,#E8432D,transparent)}
.gh-J::before{background:linear-gradient(135deg,#3A86FF,transparent)}
.gh-K::before{background:linear-gradient(135deg,#FF6B35,transparent)}
.gh-L::before{background:linear-gradient(135deg,#7B2FBE,transparent)}
.gl-A{color:#E8432D;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-B{color:#3A86FF;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-C{color:#7B2FBE;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-D{color:#06D6A0;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-E{color:#FF6B35;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-F{color:#F5C842;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-G{color:#2EC4B6;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-H{color:#9BF542;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-I{color:#E8432D;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-J{color:#3A86FF;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-K{color:#FF6B35;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.gl-L{color:#7B2FBE;font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;position:relative;z-index:1}
.group-teams{font-size:13px;color:var(--muted);line-height:1.7;position:relative;z-index:1}
.group-teams b{color:var(--text)}

/* MATCH BLOCK */
.match-block{border-bottom:1px solid var(--border)}
.match-block:last-child{border-bottom:none}

.match-header{display:grid;grid-template-columns:65px 1fr 85px 1fr 60px;align-items:center;gap:8px;padding:13px 20px;transition:background .15s;cursor:pointer}
.match-header:hover{background:rgba(255,255,255,.025)}
.match-date{font-size:11px;color:var(--muted);letter-spacing:.5px}
.match-home{font-size:13px;font-weight:500;text-align:right}
.match-away{font-size:13px;font-weight:500}
.match-score{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;background:var(--bg3);border-radius:8px;padding:5px 0}
.match-score.has{color:#F5C842}
.match-score.pend{color:var(--muted);font-size:14px;letter-spacing:1px}
.match-toggle{font-size:11px;color:var(--muted);text-align:right;transition:color .2s}
.match-header:hover .match-toggle{color:var(--c2)}

/* BETS PANEL */
.bets-panel{display:none;padding:0 20px 16px;background:rgba(0,0,0,.2)}
.bets-panel.open{display:block}
.bets-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-top:14px;border-top:1px solid var(--border)}

.coach-bets-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding:10px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)}
.cb-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:#fff;flex-shrink:0;font-weight:700}
.cb-info{flex:1}
.cb-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
.cb-tokens{display:flex;gap:5px;flex-wrap:wrap}

/* TOKEN CHIPS */
.token-chip{display:flex;align-items:center;gap:4px;padding:3px 9px 3px 5px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid transparent}
.token-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:10px;flex-shrink:0}
/* Colors by bet type */
.t-result{background:rgba(232,67,45,.12);border-color:rgba(232,67,45,.3);color:#E8432D}
.t-result .token-dot{background:#E8432D;color:#fff}
.t-score{background:rgba(58,134,255,.12);border-color:rgba(58,134,255,.3);color:#3A86FF}
.t-score .token-dot{background:#3A86FF;color:#fff}
.t-first{background:rgba(6,214,160,.12);border-color:rgba(6,214,160,.3);color:#06D6A0}
.t-first .token-dot{background:#06D6A0;color:#000}
.t-goals{background:rgba(255,107,53,.12);border-color:rgba(255,107,53,.3);color:#FF6B35}
.t-goals .token-dot{background:#FF6B35;color:#fff}
.t-penalty{background:rgba(155,245,66,.12);border-color:rgba(155,245,66,.3);color:#6aa620}
.t-penalty .token-dot{background:#9BF542;color:#000}

.no-bets{font-size:12px;color:var(--muted);padding:10px 0;font-style:italic}

/* RANKING */
.rank-visual{border-radius:16px;overflow:hidden;margin-bottom:16px;position:relative;min-height:180px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--border)}
.rv-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.rv-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(10,10,15,.75),rgba(123,47,190,.45))}
.rv-content{position:relative;z-index:2;text-align:center;padding:28px 20px}
.rv-day{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:5px}
.rv-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:3px;
  background:linear-gradient(135deg,#F5C842,#FF6B35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.rv-sub{font-size:13px;color:rgba(255,255,255,.45);margin-top:7px}
.rv-logo{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-top:10px}

.rank-colorbar{display:flex;height:4px;margin-bottom:18px;border-radius:100px;overflow:hidden;gap:1px}
.rcb{flex:1}

.rank-table{width:100%;border-collapse:collapse}
.rank-table th{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:10px 16px;text-align:left;border-bottom:1px solid var(--border)}
.rank-table td{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.035);font-size:14px;vertical-align:middle}
.rank-table tr:hover td{background:rgba(255,255,255,.02)}
.rank-badge{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px}
.r1{background:linear-gradient(135deg,#FFE27A,#C9963A);color:#000}
.r2{background:linear-gradient(135deg,#E0E0E0,#9E9E9E);color:#000}
.r3{background:linear-gradient(135deg,#CD7F32,#7B3F00);color:#fff}
.rx{background:var(--bg3);color:var(--muted)}
.coach-name{font-weight:600;color:var(--text)}
.coach-team{font-size:12px;color:var(--muted);margin-top:1px}
.pts-wrap{display:flex;align-items:center;justify-content:flex-end;gap:10px}
.pts-bar-bg{width:70px;height:5px;background:var(--bg3);border-radius:3px}
.pts-bar{height:100%;border-radius:3px;transition:width .6s}
.pts-num{font-family:'Bebas Neue',sans-serif;font-size:24px;
  background:linear-gradient(135deg,#F5C842,#FF6B35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;min-width:32px;text-align:right}
.q32-sep td{padding:6px 16px;background:rgba(123,47,190,.08);font-size:10px;color:#8B5CF6;letter-spacing:2px;text-transform:uppercase;border-top:2px solid rgba(123,47,190,.3);border-bottom:none}

/* ADMIN */
.admin-fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,#7B2FBE,#5B1F9E);border:none;cursor:pointer;
  font-size:22px;box-shadow:0 4px 24px rgba(123,47,190,.5);
  display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;z-index:100}
.admin-fab:hover{transform:scale(1.1);box-shadow:0 6px 32px rgba(123,47,190,.7)}

.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);
  backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid rgba(123,47,190,.3);border-radius:20px;
  width:100%;max-width:720px;max-height:93vh;overflow-y:auto;padding:26px;
  box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;
  background:linear-gradient(135deg,#F5C842,#FF6B35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px}

.pw-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.pw-input{padding:13px 20px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);font-size:18px;width:100%;max-width:280px;
  text-align:center;letter-spacing:5px}
.pw-input:focus{outline:none;border-color:#7B2FBE}
.pw-error{color:#EF4444;font-size:13px;display:none}
.pw-error.show{display:block}

.admin-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px}
.admin-tab{padding:6px 12px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;transition:all .2s}
.admin-tab.active{background:rgba(123,47,190,.2);border-color:#7B2FBE;color:#F5C842}

.small-label{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.coach-row-edit{display:grid;grid-template-columns:24px 1fr 1fr 62px;gap:7px;align-items:center;margin-bottom:6px}
.coach-row-edit input,.vi-input{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%}
.coach-row-edit input:focus,.vi-input:focus{outline:none;border-color:#7B2FBE}
.pts-edit{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#F5C842}
.row-num{font-size:11px;color:var(--muted);text-align:center}

/* MATCH ADMIN */
.match-admin-block{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.match-admin-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.match-admin-title span{font-size:11px;color:var(--muted);font-weight:400}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.score-input{width:80px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;text-align:center}
.score-input:focus{outline:none;border-color:#F5C842}

/* BETS ADMIN */
.bets-admin-section{margin-top:10px}
.bets-admin-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.bet-admin-row{display:grid;grid-template-columns:1fr 1fr 40px;gap:7px;align-items:center;margin-bottom:6px;background:rgba(0,0,0,.2);border-radius:8px;padding:8px 10px}
.bet-admin-row select,.bet-admin-row input{padding:6px 8px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;width:100%}
.bet-admin-row select:focus,.bet-admin-row input:focus{outline:none;border-color:#7B2FBE}
.bet-del{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#EF4444;border-radius:7px;padding:6px;cursor:pointer;font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.bet-del:hover{background:rgba(239,68,68,.3)}
.add-bet-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px dashed rgba(245,200,66,.3);background:transparent;color:#F5C842;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;margin-top:6px}
.add-bet-btn:hover{border-color:#F5C842;background:rgba(245,200,66,.06)}

.vi-label{font-size:13px;color:var(--text);display:block;margin-bottom:5px}
.vi-preview{width:100%;height:110px;border-radius:10px;object-fit:cover;margin-top:8px;display:none;border:1px solid var(--border)}
.vi-preview.show{display:block}

.btn{padding:10px 22px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;transition:all .2s}
.btn-gold{background:linear-gradient(135deg,#F5C842,#FF6B35);color:#000}
.btn-gold:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.flex-end{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.divider{height:1px;background:var(--border);margin:16px 0}

.panel{display:none}.panel.active{display:block}
.footer{text-align:center;padding:18px 0 8px;font-size:11px;color:var(--muted);letter-spacing:2px}
.footer span{color:#F5C842}

@media(max-width:600px){
  .match-header{grid-template-columns:48px 1fr 68px 1fr 38px;gap:5px;padding:10px 12px}
  .match-home,.match-away{font-size:11px}
  .match-score{font-size:17px}
  .rank-table td,.rank-table th{padding:9px 10px}
  .coach-row-edit{grid-template-columns:20px 1fr 1fr 52px}
  .modal-box{padding:16px}
  .bet-admin-row{grid-template-columns:1fr 1fr 32px}
  .pts-bar-bg{width:50px}
  .bets-panel{padding:0 12px 12px}
  .cb-avatar{width:28px;height:28px}
}
</style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>
<div class="app">

<!-- HEADER -->
